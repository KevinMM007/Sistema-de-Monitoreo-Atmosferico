[pytest]
# Configuración de pytest para el Sistema de Monitoreo de Calidad del Aire
# =========================================================================

# Directorios de tests
testpaths = tests

# Opciones por defecto
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Configuración de asyncio
asyncio_mode = auto

# Filtros de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Marcadores personalizados
markers =
    slow: Tests que toman mucho tiempo
    integration: Tests de integración con APIs externas
    unit: Tests unitarios

# Timeout por test (en segundos)
timeout = 30

# Mostrar output de print
log_cli = true
log_cli_level = INFO

# Formato de reporte
console_output_style = count
