# render.yaml - Configuración de despliegue para Render
# Sistema de Monitoreo de Calidad del Aire - Xalapa

services:
  # Backend API (FastAPI)
  - type: web
    name: air-quality-xalapa-api
    runtime: python
    region: oregon  # Región más cercana a México
    plan: free
    branch: version-final-beta
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 300 --keep-alive 5
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false  # Se configura manualmente
      - key: TOMTOM_API_KEY
        sync: false  # Se configura manualmente
      - key: EMAIL_USER
        sync: false  # Se configura manualmente
      - key: EMAIL_PASSWORD
        sync: false  # Se configura manualmente
